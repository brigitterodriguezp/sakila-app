spring.application.name=sakila

# ============================================================
# DATASOURCE - HikariCP Connection Pool
# ============================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sakila}
spring.datasource.username=${DB_USERNAME:brigitte}
spring.datasource.password=${DB_PASSWORD:b74g1tt3}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.pool-name=SakilaPool
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.leak-detection-threshold=10000
spring.datasource.hikari.register-mbeans=true

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.sql.init.mode=never

# ============================================================
# SECURITY - JWT
# ============================================================
app.jwt.secret=${JWT_SECRET:a2V5c2FraWxhcmVudGFsMjAyNnNlZ3VyaWRhZGp3dGFhMA==}
app.jwt.expiration-ms=${JWT_EXPIRATION:432000000}

# ============================================================
# SERVER
# ============================================================
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json
server.tomcat.max-threads=20
server.tomcat.min-spare-threads=5
server.tomcat.max-connections=50
server.tomcat.accept-count=10
server.tomcat.connection-timeout=10000
server.tomcat.max-swallow-size=2MB

# ============================================================
# LOGGING
# ============================================================
logging.level.com.app.sakila=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
